<!-- third party scripts -->
<script src="https://unpkg.com/@popperjs/core@2" defer></script>
<script src="https://unpkg.com/tippy.js@6" defer></script>
<script src="https://unpkg.com/mark.js@8" defer></script>

<!-- include all js in scripts folder -->
{% assign scripts = site.static_files | where_exp: "file", "file.path contains '/_scripts'" %}
{% for script in scripts %}
  <script src="{{ script.path | relative_url }}?v={{ site.time | date: '%s' }}"></script>
{% endfor %}

<!-- include all css in styles folder (cache-bust with build time) -->
{% comment %} Styles are already emitted in styles.html; cache-busting there is handled similarly. {% endcomment %}
